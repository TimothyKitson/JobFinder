name: job_finder
description: "A local job finder app — find, apply, and send resumes to nearby businesses."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  url_launcher: ^6.3.0
  provider: ^6.1.2
  shared_preferences: ^2.3.0
  file_picker: ^8.1.0
  pdf: ^3.10.8
  printing: ^5.13.0
  path_provider: ^2.1.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true